<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Document AI Upload</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --border: #d9e0ea;
      --text: #172033;
      --muted: #5f6f86;
      --accent: #1769aa;
      --accent-strong: #0f4f86;
      --success-bg: #e7f6ee;
      --success-text: #14613a;
      --error-bg: #fdecec;
      --error-text: #9b1c1c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    .shell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(22, 32, 51, 0.08);
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .records-link {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--accent);
      font-weight: 650;
      text-decoration: none;
      white-space: nowrap;
    }

    .message {
      margin-bottom: 18px;
      border-radius: 6px;
      padding: 12px 14px;
      font-weight: 650;
    }

    .message.success {
      background: var(--success-bg);
      color: var(--success-text);
    }

    .message.error {
      background: var(--error-bg);
      color: var(--error-text);
    }

    form {
      display: grid;
      gap: 16px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input[type="file"] {
      width: 100%;
      border: 1px dashed #9aa8ba;
      border-radius: 8px;
      background: #fbfcfe;
      padding: 18px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
    }

    button {
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 750;
      min-height: 42px;
      padding: 10px 18px;
    }

    button:hover {
      background: var(--accent-strong);
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 20px, 920px);
        padding: 20px 0;
      }

      .shell {
        padding: 20px;
      }

      .topbar {
        display: grid;
      }

      .records-link {
        width: 100%;
        justify-content: center;
      }

      .actions {
        justify-content: stretch;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="shell">
      <div class="topbar">
        <div>
          <h1>Document AI Upload</h1>
          <p>Upload a PDF to extract and store document data.</p>
        </div>
        {% if records_url %}
          <a class="records-link" href="{{ records_url }}">View records</a>
        {% endif %}
      </div>

      {% if uploaded %}
        <div class="message success">File uploaded: {{ uploaded }}</div>
      {% endif %}

      {% if error %}
        <div class="message error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/upload" enctype="multipart/form-data">
        <div>
          <label for="file">PDF file</label>
          <input id="file" type="file" name="file" accept="application/pdf,.pdf">
        </div>
        <div class="actions">
          <button type="submit">Upload</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
